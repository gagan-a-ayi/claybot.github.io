<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/png" href="claybot.png">
<title>ClayBot – Mental Health Check-in</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --indigo: #4f46e5; --cyan: #06b6d4; --violet: #7c3aed;
    --emerald: #10b981; --rose: #f43f5e; --amber: #f59e0b;
    --text: #e2e8f0; --muted: #94a3b8; --bg: #0f0f1a;
    --card-bg: rgba(22,22,42,0.78); --bubble-bot: rgba(79,70,229,0.18);
  }
  html,body { width:100%; height:100%; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); overflow:hidden; }

  .orb-layer { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:.32; animation:orbDrift 8s ease-in-out infinite alternate; }
  .orb1 { width:420px;height:420px;background:radial-gradient(circle,#4f46e5,transparent 70%);top:-120px;left:-100px;animation-duration:9s; }
  .orb2 { width:320px;height:320px;background:radial-gradient(circle,#06b6d4,transparent 70%);bottom:-80px;right:-60px;animation-duration:11s;animation-delay:-3s; }
  .orb3 { width:260px;height:260px;background:radial-gradient(circle,#f43f5e,transparent 70%);top:40%;left:60%;animation-duration:13s;animation-delay:-6s; }
  @keyframes orbDrift { from{transform:translate(0,0)scale(1)} to{transform:translate(30px,20px)scale(1.1)} }

  .stage { position:relative;z-index:1;display:flex;align-items:center;justify-content:center;width:100%;height:100vh;padding:20px; }

  .card { width:100%;max-width:480px;height:740px;background:var(--card-bg);border-radius:40px;border:1.5px solid rgba(79,70,229,.28);box-shadow:8px 8px 0px rgba(79,70,229,.22),0 30px 80px rgba(0,0,0,.5);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);display:flex;flex-direction:column;overflow:hidden; }

  /* Header */
  .header { background:linear-gradient(135deg,#4f46e5 0%,#06b6d4 100%);padding:18px 22px;display:flex;align-items:center;gap:14px;flex-shrink:0; }
  .logo-tile { width:46px;height:46px;background:rgba(255,255,255,.15);border-radius:18px;border:1.5px solid rgba(255,255,255,.28);box-shadow:4px 4px 0 rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;font-size:22px;animation:logoBob 3s ease-in-out infinite alternate;flex-shrink:0; }
  @keyframes logoBob { from{transform:translateY(0)rotate(-2deg)} to{transform:translateY(-4px)rotate(2deg)} }
  .header-info { flex:1; }
  .bot-name { font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:#fff;letter-spacing:-.3px; }
  .status-row { display:flex;align-items:center;gap:6px;margin-top:3px; }
  .status-dot { width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80, 0 0 16px rgba(74,222,128,.6);animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.8)} }
  .status-text { font-size:12px;color:rgba(255,255,255,.75);font-weight:500; }
  .live-badge { background:rgba(74,222,128,.25);border:2px solid rgba(74,222,128,.8);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px;box-shadow:0 0 12px rgba(74,222,128,.5); }

  /* Level badge */
  .level-badge { display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:8px;letter-spacing:.4px; }
  .level-basic    { background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.4);color:#6ee7b7; }
  .level-intermediate { background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.4);color:#67e8f9; }
  .level-advanced { background:rgba(79,70,229,.2);border:1px solid rgba(79,70,229,.5);color:#a5b4fc; }
  .level-pro      { background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.5);color:#c4b5fd; }
  .level-consult  { background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.4);color:#fca5a5; }

  /* Progress stepper */
  .progress-bar { display:flex;align-items:center;gap:4px;margin-bottom:10px;flex-wrap:wrap; }
  .prog-step { display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--muted); }
  .prog-step.active { color:var(--cyan); }
  .prog-step.done { color:var(--emerald); text-decoration:line-through;opacity:.7; }
  .prog-dot { width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0; }
  .prog-sep { width:12px;height:1px;background:rgba(255,255,255,.1);flex-shrink:0; }

  /* Messages */
  .messages { flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 18px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth; }
  .messages::-webkit-scrollbar { width:4px; }
  .messages::-webkit-scrollbar-thumb { background:rgba(79,70,229,.3);border-radius:4px; }

  .msg-row { display:flex;gap:10px;animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes popIn { from{opacity:0;transform:scale(.8)translateY(10px)} to{opacity:1;transform:scale(1)translateY(0)} }
  .msg-row.bot { align-items:flex-end; }
  .msg-row.user { justify-content:flex-end; }

  .bot-avatar { width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--indigo),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;box-shadow:3px 3px 0 rgba(79,70,229,.3); }

  .bubble { max-width:82%;padding:13px 16px;font-size:13.5px;line-height:1.68;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px); }
  .bubble.bot-bubble { background:var(--bubble-bot);border:1px solid rgba(79,70,229,.35);border-radius:22px 22px 22px 6px;box-shadow:5px 5px 0 rgba(79,70,229,.18);color:var(--text); }
  .bubble.user-bubble { background:linear-gradient(135deg,#06b6d4,#4f46e5);border-radius:22px 22px 6px 22px;color:#fff;box-shadow:5px 5px 0 rgba(6,182,212,.2);font-weight:500; }

  .bubble h2 { font-size:16px;font-weight:700;color:#fff;border-bottom:1.5px solid rgba(79,70,229,.5);padding-bottom:5px;margin-bottom:9px; }
  .bubble h3 { font-size:12.5px;font-weight:700;text-transform:uppercase;color:#c4b5fd;letter-spacing:.8px;margin:10px 0 5px; }
  .bubble strong { color:#fff;font-weight:700; }
  .bubble em { color:#c4b5fd;font-style:italic; }
  .bubble ul { list-style:none;padding-left:2px;margin:5px 0;display:flex;flex-direction:column;gap:4px; }
  .bubble ul li { padding-left:16px;position:relative; }
  .bubble ul li::before { content:'▸';color:var(--indigo);position:absolute;left:0;font-size:12px; }
  .bubble blockquote { border-left:3px solid var(--indigo);background:rgba(79,70,229,.1);padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0;color:#c4b5fd;font-style:italic;font-size:13px; }
  .bubble p { margin-bottom:6px; }
  .bubble p:last-child { margin-bottom:0; }
  .bubble code { background:rgba(6,182,212,.15);color:#67e8f9;font-family:'Courier New',monospace;font-size:11.5px;padding:1px 6px;border-radius:5px; }

  /* Next level prompt */
  .next-level-wrap { margin-top:10px; }
  .next-level-btn { display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid rgba(79,70,229,.4);color:#a5b4fc;font-size:12px;font-weight:600;padding:7px 16px;border-radius:20px;cursor:pointer;transition:all .2s; }
  .next-level-btn:hover { background:rgba(79,70,229,.25);border-color:var(--indigo);color:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3); }

  /* Quick replies */
  .quick-replies { display:flex;flex-wrap:wrap;gap:7px;margin-top:10px; }
  .qr-chip { background:rgba(79,70,229,.15);border:1px solid rgba(79,70,229,.4);color:#c4b5fd;font-size:12px;font-weight:600;padding:6px 13px;border-radius:20px;cursor:pointer;transition:all .2s; }
  .qr-chip:hover { background:rgba(79,70,229,.35);border-color:var(--indigo);color:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3); }

  /* Source chips */
  .source-chips { display:flex;flex-wrap:wrap;gap:6px;margin-top:8px; }
  .source-chip { display:flex;align-items:center;gap:5px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.28);color:#67e8f9;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;cursor:pointer;transition:transform .2s,box-shadow .2s; }
  .source-chip:hover { transform:translateY(-1px);box-shadow:0 4px 10px rgba(6,182,212,.2); }

  /* Typing */
  .typing-bubble { display:flex;align-items:center;gap:8px;padding:13px 16px;background:var(--bubble-bot);border:1px solid rgba(79,70,229,.35);border-radius:22px 22px 22px 6px;box-shadow:5px 5px 0 rgba(79,70,229,.18); }
  .dots { display:flex;gap:4px;align-items:center; }
  .dot { width:7px;height:7px;border-radius:50%;background:var(--indigo);animation:bounce 1.1s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:.15s} .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce { 0%,100%{transform:translateY(0);opacity:.5} 50%{transform:translateY(-5px);opacity:1} }

  /* Input */
  .input-area { padding:14px 16px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-top:1px solid rgba(79,70,229,.15);background:rgba(15,15,26,.5); }
  .input-pill { flex:1;background:rgba(255,255,255,.05);border:1.5px solid rgba(79,70,229,.25);border-radius:30px;padding:12px 20px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;box-shadow:inset 2px 2px 6px rgba(0,0,0,.2);transition:border-color .2s,box-shadow .2s;resize:none;min-height:46px;max-height:120px;overflow-y:auto; }
  .input-pill::placeholder { color:var(--muted); }
  .input-pill:focus { border-color:var(--indigo);box-shadow:inset 2px 2px 6px rgba(0,0,0,.2),0 0 0 3px rgba(79,70,229,.18); }
  .send-btn { width:48px;height:48px;background:linear-gradient(135deg,var(--indigo),var(--cyan));border:none;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:4px 4px 0 rgba(79,70,229,.35);transition:transform .15s,box-shadow .15s;flex-shrink:0; }
  .send-btn:hover { transform:translateY(-2px);box-shadow:4px 6px 0 rgba(79,70,229,.45); }
  .send-btn:active { animation:springBounce .35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes springBounce { 0%{transform:scale(1)} 40%{transform:scale(.85)} 70%{transform:scale(1.1)} 100%{transform:scale(1)} }
  .send-btn svg { width:20px;height:20px;fill:#fff; }

  @media(max-width:500px){.stage{padding:0;align-items:flex-end}.card{max-width:100%;height:100vh;border-radius:24px 24px 0 0}}

  .end-chat-wrap {
    margin-top:8px;
  }

  .end-chat-btn {
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(244,63,94,.15);
    border:1px solid rgba(244,63,94,.4);
    color:#fca5a5;
    font-size:12px;
    font-weight:600;
    padding:7px 16px;
    border-radius:20px;
    cursor:pointer;
    transition:all .2s;
  }

  .end-chat-btn:hover {
    background:rgba(244,63,94,.3);
    border-color:#f43f5e;
    color:#fff;
    transform:translateY(-1px);
    box-shadow:0 4px 12px rgba(244,63,94,.3);
  }
</style>
</head>
<body>
<div class="orb-layer">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>
<div class="stage">
  <div class="card">
    <div class="header">
      <div class="logo-tile">🧠</div>
      <div class="header-info">
        <div class="bot-name">ClayBot</div>
        <div class="status-row"><div class="status-dot"></div><span class="status-text">Mental Health Check-in</span></div>
      </div>
      <div class="live-badge">LIVE</div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea class="input-pill" id="userInput" placeholder="How are you feeling today…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>
</div>
<script src="claybot-dataset.js"></script>
<script>
// ── Conversation state ────────────────────────────────────────────────
let state = {
  topic: null,
  subtype: null,
  levelIndex: 0,
  awaitingSubtype: false,
  awaitingTopic: false
};

// ── Pattern matcher ───────────────────────────────────────────────────
function detectTopic(input) {
  const t = input.toLowerCase();
  if (/stress|stressed|overwhelmed|too much|burnt out|burnout|pressure/i.test(t)) return 'stress';
  if (/anxi|panic|nervous|worry|worried|fear|afraid|dread/i.test(t)) return 'anxiety';
  if (/sad|depressed|depression|unhappy|miserable|hopeless|down|low|cry|grief|griev|loss|lost|lonely|alone|heartbreak|breakup|broke up/i.test(t)) return 'sadness';
  if (/great|amazing|wonderful|happy|joy|excit|good|fantastic|content|peaceful|grateful|proud|accomplished/i.test(t)) return 'great';
  if (/coping|cope|overwhelm|procrastin|motiv|anger|angry|frustrat|tip|advice|what can i do|help me|strategy/i.test(t)) return 'coping';
  if (/sleep|insomnia|can't sleep|tired|exhausted|fatigue|nightmare|wake up at night|no energy|always tired/i.test(t)) return 'sleep';
  return null;
}

function detectSubtype(input, topic) {
  const t = input.toLowerCase();
  const ds = DATASET[topic];
  if (!ds) return null;
  const keys = Object.keys(ds.subtypes);
  const keyMaps = {
    stress:   { work:'work', academic:'work', study:'work', job:'work', career:'work', relationship:'relationship', partner:'relationship', financial:'financial', money:'financial', debt:'financial', general:'general' },
    anxiety:  { social:'social', people:'social', crowd:'social', performance:'performance', exam:'performance', presentation:'performance', health:'health', illness:'health', sick:'health', general:'general' },
    sadness:  { grief:'grief', loss:'grief', died:'grief', death:'grief', loneli:'loneliness', alone:'loneliness', isolated:'loneliness', heartbreak:'breakup', breakup:'breakup', 'broke up':'breakup', general:'general', low:'general' },
    great:    { energi:'energised', motiv:'energised', peaceful:'peaceful', calm:'peaceful', grateful:'grateful', thankful:'grateful', accomplish:'accomplished', proud:'accomplished', win:'accomplished' },
    coping:   { overwhelm:'overwhelm', procrastin:'procrastination', anger:'anger', angry:'anger', frustrat:'anger', motiv:'motivation' },
    sleep:    { insomnia:'insomnia', 'cant fall asleep':'insomnia', 'fall asleep':'insomnia', waking:'waking', 'wake up':'waking', 'wake during':'waking', 'during the night':'waking', tired:'tiredness', exhausted:'tiredness', fatigue:'tiredness', 'no energy':'tiredness', 'always tired':'tiredness', nightmare:'nightmares', 'bad dream':'nightmares', disturbed:'nightmares', ptsd:'nightmares' }
  };
  const map = keyMaps[topic] || {};
  for (const [kw, sub] of Object.entries(map)) {
    if (t.includes(kw) && keys.includes(sub)) return sub;
  }
  for (const key of keys) {
    if (t.includes(key)) return key;
  }
  return null;
}

// ── Render helpers ─────────────────────────────────────────────────────
const LEVEL_META = {
  basic:        { label:'Basic',               color:'level-basic',        icon:'🌱', order:0 },
  intermediate: { label:'Intermediate',        color:'level-intermediate', icon:'🌿', order:1 },
  advanced:     { label:'Advanced',            color:'level-advanced',     icon:'🔥', order:2 },
  pro:          { label:'Pro',                 color:'level-pro',          icon:'💎', order:3 },
  consult:      { label:'See a Professional',  color:'level-consult',      icon:'🏥', order:4 },
};

function progressHTML(levelIndex, totalLevels) {
  const stages = ['Basic','Intermediate','Advanced','Pro'];
  const display = stages.slice(0, totalLevels);
  let html = '<div class="progress-bar">';
  display.forEach((s, i) => {
    const cls = i < levelIndex ? 'done' : i === levelIndex ? 'active' : '';
    html += `<div class="prog-step ${cls}"><div class="prog-dot"></div>${s}</div>`;
    if (i < display.length - 1) html += '<div class="prog-sep"></div>';
  });
  html += '</div>';
  return html;
}

function levelBadge(lvl) {
  const m = LEVEL_META[lvl] || LEVEL_META.basic;
  return `<div class="level-badge ${m.color}">${m.icon} ${m.label}</div>`;
}

function buildLevelResponse(topic, subtype, levelIndex) {
  const ds = DATASET[topic];
  if (!ds || !ds.subtypes[subtype]) return null;
  const levels = ds.subtypes[subtype].levels;
  if (levelIndex >= levels.length) return null;
  const lvl = levels[levelIndex];
  const totalLevels = levels.length;

  let html = progressHTML(levelIndex, totalLevels);
  html += levelBadge(lvl.level);
  /*html += `<h2>${lvl.icon} ${lvl.title}</h2>`;*/
  html += lvl.text;

  const isLast = levelIndex === totalLevels - 1;
  const qr = lvl.qr || [];

  return { html, isLast, qr, sources: lvl.sources };
}

// ── DOM ────────────────────────────────────────────────────────────────
const msgContainer = document.getElementById('messages');
const userInput    = document.getElementById('userInput');
const sendBtn      = document.getElementById('sendBtn');

function scrollBottom() { msgContainer.scrollTop = msgContainer.scrollHeight; }

function appendUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble user-bubble">${escapeHtml(text)}</div>`;
  msgContainer.appendChild(row);
  scrollBottom();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing-row';
  row.innerHTML = `<div class="bot-avatar">🧠</div><div class="typing-bubble"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgContainer.appendChild(row); scrollBottom();
  return row;
}

function removeTyping() { const t = document.getElementById('typing-row'); if (t) t.remove(); }

// ── FIXED: showTypingThen was missing — restored here ─────────────────
function showTypingThen(cb, delay) {
  showTyping();
  setTimeout(() => { removeTyping(); cb(); }, delay || 900 + Math.random() * 500);
}

function appendBotMsg({ html, qr = [], sources = [], showNext = false, nextLabel = '', isConsult = false }) {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  let inner = `<div class="bot-avatar">🧠</div><div>`;
  inner += `<div class="bubble bot-bubble">${html}</div>`;

  if (qr.length) {
    inner += `<div class="quick-replies">` + qr.map(q => `<span class="qr-chip" data-msg="${q}">${q}</span>`).join('') + `</div>`;
  }
  if (showNext && !isConsult) {
    inner += `<div class="next-level-wrap"><button class="next-level-btn" id="next-level-btn">⬆️ ${nextLabel} — try next level</button></div>`;
  }
  if (sources && sources.length) {
    inner += `<div class="source-chips">` + sources.map(s => `<span class="source-chip"><svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 17.93V18a1 1 0 00-2 0v1.93A8.001 8.001 0 014.07 13H6a1 1 0 000-2H4.07A8.001 8.001 0 0111 4.07V6a1 1 0 002 0V4.07A8.001 8.001 0 0119.93 11H18a1 1 0 000 2h1.93A8.001 8.001 0 0113 19.93z"/></svg>${s}</span>`).join('') + `</div>`;
  }
  if (!qr.includes("🔄 Restart Chat")) {
    inner += `<div class="end-chat-wrap"><button class="end-chat-btn">🛑 End Chat</button></div>`;
  }

  inner += `</div>`;
  row.innerHTML = inner;
  msgContainer.appendChild(row);
  scrollBottom();

  row.querySelectorAll('.qr-chip').forEach(chip => {
    chip.addEventListener('click', () => sendMessage(chip.dataset.msg));
  });
  const endBtn = row.querySelector('.end-chat-btn');
  if (endBtn) endBtn.addEventListener('click', endConversation);

  const nb = document.getElementById('next-level-btn');
  if (nb) {
    nb.addEventListener('click', () => {
      nb.closest('.next-level-wrap').remove();
      escalateLevel();
    });
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Level escalation ──────────────────────────────────────────────────
async function escalateLevel() {
  const ds = DATASET[state.topic];
  const levels = ds.subtypes[state.subtype].levels;
  state.levelIndex++;

  // Past all levels — show professional consult
  if (state.levelIndex >= levels.length) {
    showTypingThen(() => appendBotMsg({
      html: CONSULT_LEVEL.text,
      sources: CONSULT_LEVEL.sources,
      qr: ["Start over", "I feel better now", "Thank you ClayBot"],
      showNext: false,
      isConsult: true
    }));
    return;
  }

  const result = buildLevelResponse(state.topic, state.subtype, state.levelIndex);
  if (!result) return;

  const hasNextLevel = state.levelIndex + 1 < levels.length;
  const nextLvl = hasNextLevel ? levels[state.levelIndex + 1].level : 'consult';
  const nextMeta = LEVEL_META[nextLvl] || LEVEL_META.consult;

  showTypingThen(() => appendBotMsg({
    html: result.html,
    qr: result.qr,
    sources: result.sources,
    showNext: hasNextLevel,
    nextLabel: hasNextLevel ? `${nextMeta.icon} ${nextMeta.label}` : '',
  }));
}

// ── Main respond logic ─────────────────────────────────────────────────
async function respond(input) {
  const t = input.toLowerCase().trim();

  if (/restart chat|🔄 restart chat/i.test(t)) { restartChat(); return; }

  if (/suicid|hurt myself|self.harm|end my life|die|no reason to live|want to die/i.test(t)) {
    showTypingThen(() => appendBotMsg({
      html: `<h2>Please reach out right now 🆘</h2><p>I'm very concerned about you. <strong>Your life matters.</strong></p><ul><li><strong>India:</strong> iCall <code>9152987821</code> | Vandrevala <code>1860-2662-345</code></li><li><strong>US:</strong> Call or text <code>988</code></li><li><strong>UK:</strong> Samaritans <code>116 123</code></li><li><strong>International:</strong> <code>befrienders.org</code></li></ul><blockquote>Please reach out to one of these now. You don't have to face this alone. 💙</blockquote>`,
      qr: ["I'm safe but struggling", "I need to talk more"],
      sources: ["befrienders.org", "988lifeline.org"]
    })); return;
  }

  if (/start over|reset|new topic|different topic|back to start/i.test(t)) {
    state = { topic: null, subtype: null, levelIndex: 0, awaitingSubtype: false, awaitingTopic: false };
    showTypingThen(() => appendBotMsg({
      html: `<h2>Let's start fresh 🌿</h2><p>What would you like to check in about today?</p>`,
      qr: ["I'm stressed", "I'm anxious", "I'm sad", "I'm feeling great", "I need coping tips", "I can't sleep"]
    })); return;
  }

  if (state.awaitingSubtype && state.topic) {
    const sub = detectSubtype(input, state.topic);
    const ds = DATASET[state.topic];
    if (sub && ds.subtypes[sub]) {
      state.subtype = sub;
      state.levelIndex = 0;
      state.awaitingSubtype = false;
      const result = buildLevelResponse(state.topic, state.subtype, 0);
      const levels = ds.subtypes[state.subtype].levels;
      const nextLvl = levels.length > 1 ? levels[1].level : 'consult';
      const nextMeta = LEVEL_META[nextLvl] || LEVEL_META.consult;
      showTypingThen(() => appendBotMsg({
        html: result.html,
        qr: result.qr || [],
        sources: result.sources,
        showNext: true,
        nextLabel: `${nextMeta.icon} ${nextMeta.label}`,
      }));
      return;
    }
    showTypingThen(() => appendBotMsg({
      html: `<p>Could you pick one of the options below so I can give you the most targeted help? 🙏</p>`,
      qr: ds.subQR
    }));
    return;
  }

  const topic = detectTopic(input);
  if (topic) {
    state.topic = topic;
    state.levelIndex = 0;
    state.awaitingSubtype = true;
    const sub = detectSubtype(input, topic);
    const ds = DATASET[topic];
    if (sub && ds.subtypes[sub]) {
      state.subtype = sub;
      state.awaitingSubtype = false;
      const result = buildLevelResponse(topic, sub, 0);
      const levels = ds.subtypes[sub].levels;
      const nextLvl = levels.length > 1 ? levels[1].level : 'consult';
      const nextMeta = LEVEL_META[nextLvl] || LEVEL_META.consult;
      showTypingThen(() => appendBotMsg({
        html: result.html,
        qr: result.qr || [],
        sources: result.sources,
        showNext: true,
        nextLabel: `${nextMeta.icon} ${nextMeta.label}`,
      }));
    } else {
      const topicLabels = {
        stress: "stressed", anxiety: "anxious", sadness: "sad or low",
        great: "great", coping: "looking for coping strategies", sleep: "having sleep issues"
      };
      showTypingThen(() => appendBotMsg({
        html: `<h2>I hear you 💙</h2><p>It sounds like you're feeling <strong>${topicLabels[topic] || topic}</strong>. To give you the most relevant, personalised support — can you tell me a bit more about what type?</p>`,
        qr: ds.subQR
      }));
    }
    return;
  }

  if (/not helping|need more|something else|different|still struggling|didn't work|doesn't work/i.test(t) && state.topic && state.subtype) {
    escalateLevel(); return;
  }

  if (/feel better|helped|thank|great advice|this worked|i'm okay now|i'm good/i.test(t)) {
    state = { topic: null, subtype: null, levelIndex: 0, awaitingSubtype: false };
    showTypingThen(() => appendBotMsg({
      html: `<p>That genuinely makes me happy to hear! 🌟 You showed up for yourself today — <strong>that matters.</strong></p><p>Remember: <em>checking in with yourself regularly is one of the most powerful things you can do.</em> I'm always here if you need to talk. 💙</p>`,
      qr: ["Check in again", "I have another topic", "Thank you, goodbye!"]
    }));
    return;
  }

  if (/\bhi\b|\bhello\b|\bhey\b|\bgreetings\b|\bstart\b/i.test(t)) {
    showTypingThen(() => appendBotMsg({
      html: `<h2>Welcome to ClayBot 🧠</h2><p>I'm your <strong>Mental Health Check-in Bot</strong> — a safe, judgment-free space. I'll meet you where you are with <em>step-by-step support</em> from basic through to advanced strategies.</p><blockquote>If one level doesn't help enough, we simply go deeper — together. 💙</blockquote><p>How are you feeling today?</p>`,
      qr: ["I'm stressed", "I'm anxious", "I'm sad", "I'm feeling great", "I need coping tips", "I can't sleep"]
    })); return;
  }

  showTypingThen(() => appendBotMsg({
    html: `<p>I'm here for you 💙 Could you share a little more about how you're feeling? I can offer step-by-step support for each of these:</p>`,
    qr: ["I'm stressed", "I'm anxious", "I'm sad", "I'm feeling great", "I need coping tips", "I can't sleep"]
  }));
}

async function sendMessage(text) {
  const msg = (text || userInput.value).trim();
  if (!msg) return;
  userInput.value = '';
  userInput.style.height = 'auto';
  appendUserMsg(msg);
  await respond(msg);
}

sendBtn.addEventListener('click', () => sendMessage());
userInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px'; });

window.addEventListener('load', () => {
  appendBotMsg({
    html: `<h2>Hey there! I'm ClayBot 🧠</h2><p>Your personal <strong>Mental Health Check-in Bot</strong>. I don't just give one generic answer — I give you <em>personalised, progressive support</em>:</p><ul><li>🌱 <strong>Basic</strong> — quick, immediate relief</li><li>🌿 <strong>Intermediate</strong> — structured strategies</li><li>🔥 <strong>Advanced</strong> — deeper work</li><li>💎 <strong>Pro</strong> — high-intensity tools</li><li>🏥 <strong>Professional help</strong> — if more support is needed</li></ul><p>How are you feeling today?</p>`,
    qr: ["I'm stressed", "I'm anxious", "I'm sad / feeling low", "I'm feeling great", "I need coping tips", "I can't sleep"]
  });
});

function restartChat() {
  state = { topic: null, subtype: null, levelIndex: 0, awaitingSubtype: false, awaitingTopic: false };
  msgContainer.innerHTML = '';
  userInput.disabled = false;
  sendBtn.disabled = false;
  userInput.value = '';
  userInput.style.height = 'auto';
  appendBotMsg({
    html: `<h2>Hey there! I'm ClayBot 🧠</h2><p>Your <strong>Mental Health Check-in Bot</strong>.</p><p>We're starting fresh. How are you feeling right now?</p>`,
    qr: ["I'm stressed", "I'm anxious", "I'm sad", "I'm feeling great", "I need coping tips", "I can't sleep"]
  });
}

function endConversation() {
  userInput.disabled = true;
  sendBtn.disabled = true;
  document.querySelectorAll('.qr-chip').forEach(el => el.remove());
  document.querySelectorAll('.next-level-btn').forEach(el => el.remove());
  document.querySelectorAll('.end-chat-wrap').forEach(el => el.remove());
  showTypingThen(() => appendBotMsg({
    html: `<h2>🌿 Session Closed</h2><p>You showed up for yourself today. That matters.</p><blockquote>Growth happens quietly. And you're growing.</blockquote>`,
    qr: ["🔄 Restart Chat"]
  }));
}
</script>
</body>
</html>
